<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
</head>
<body>
<h1>Cart</h1>
<ul>
    <li th:each="cartItem : ${cart.cartItems}">
        <img th:src="${cartItem.product.productImageURL}" style="width:100px; height:auto;"/>
        <span th:text="${cartItem.product.productName}"></span>
        <span> | Quantity: </span>
        <span th:text="${cartItem.quantity}"></span>
        <span> | Price: </span>
        <span th:text="${cartItem.product.price}"></span>
        <span> | Total: </span>
        <span th:text="${cartItem.totalPrice}"></span>


        <form th:action="@{/cart/add/{id}(id=${cartItem.product.productId})}" method="post" style="display:inline">
            <button type="submit">+</button>
        </form>
        <form th:action="@{/cart/remove/{id}(id=${cartItem.product.productId})}" method="post" style="display:inline">
            <button type="submit">-</button>
        </form>
    </li>
</ul>
<h2>Total: </h2>
<p th:text="${cart.getTotalPrice()}"></p>
<form th:action="@{/cart/checkout}" method="post" style="display:inline">
    <button type="submit">Checkout</button>
</form>
<form th:action="@{/cart/clear}" method="post" style="display:inline">
    <button type="submit">Clear cart</button>
</form>

</body>
</html>
