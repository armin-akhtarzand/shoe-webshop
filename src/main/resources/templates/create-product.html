<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Create Product - Admin</title>
    <link rel="stylesheet" th:href="@{/css/cookie-banner.css}">
    <script th:src="@{/js/cookie-banner.js}" defer></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            max-width: 700px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .error {
            color: red;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .global-error {
            background: #ffe6e6;
            color: red;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ffcccc;
        }

        .btn {
            background: green;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: darkgreen;
        }

        a {
            margin-left: 10px;
            color: #666;
        }
    </style>
</head>

<body>

<div sec:authorize="!hasRole('ADMIN')">
    <h2>Access denied</h2>
</div>

<div sec:authorize="hasRole('ADMIN')">

    <h1>Create New Product</h1>

    <div th:if="${error}" class="global-error">
        <strong>Error:</strong>
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/admin/products}" th:object="${product}" method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <div class="form-group">
            <label for="productName">Product Name</label>
            <input id="productName" type="text" th:field="*{productName}"/>
            <div class="error" th:errors="*{productName}"></div>
        </div>

        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" th:field="*{category}">
                <option value="">-- Select category --</option>
                <option value="Sneakers">Sneakers</option>
                <option value="Boots">Boots</option>
                <option value="Sandals">Sandals</option>
                <option value="Formal">Formal</option>
            </select>
            <div class="error" th:errors="*{category}"></div>
        </div>

        <div class="form-group">
            <label for="price">Price (SEK)</label>
            <input id="price" type="number" step="0.01" min="0" th:field="*{price}"/>
            <div class="error" th:errors="*{price}"></div>
        </div>

        <div class="form-group">
            <label for="productImageURL">Image URL</label>
            <input id="productImageURL" type="url" th:field="*{productImageURL}"/>
            <div class="error" th:errors="*{productImageURL}"></div>
        </div>

        <button type="submit" class="btn">Create Product</button>
        <a href="/products">Cancel</a>

    </form>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/cookie-banner :: cookieBanner}"></div>
</body>
</html>
