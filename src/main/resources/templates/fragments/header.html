<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="stylesheet" th:href="@{/css/cookie-banner.css}">
    <script th:src="@{/js/cookie-banner.js}" defer></script>
</head>
<body>
<div th:fragment="header">
    <header style="background: #f0f0f0; padding: 15px; border-bottom: 1px solid #ddd; margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
            <div>
                <h2 style="margin: 0;">
                    <a href="/" style="text-decoration: none; color: #333;">Shoe Webshop</a>
                </h2>
            </div>

            <nav style="display: flex; gap: 20px; align-items: center;">
                <a href="/" style="text-decoration: none; color: #0066cc;">Home</a>
                <span style="color: #666;">|</span>
                <a href="/products" style="text-decoration: none; color: #0066cc;">Products</a>
                <span style="color: #666;">|</span>

                <div sec:authorize="isAuthenticated()">
                    <nav style="display: flex; gap: 20px; align-items: center;">
                    <a href="/cart" style="text-decoration: none; color: #0066cc;">Cart </a>
                    <span style="color: #666;">|</span>
                    <a href="/profile" style="text-decoration: none; color: #0066cc;"> Profile</a>
                    <span style="color: #666;">|</span>
                        <span sec:authorize="hasRole('ADMIN')">
                        <a href="/admin/products/new" style="text-decoration: none; color: #0066cc;">Admin</a>
                    </span>
                        <span style="color: #666;">|</span>
                    <span sec:authentication="name" style="color: #666; font-size: 0.9em;"></span>
<!--                    <span style="color: #666;">|</span>-->
<!--                        <form th:action="@{/logout}" method="post">-->
<!--                            <button style="background-color: #151cff; color: #ffffff"  type="submit">Logout</button>-->
<!--                        </form>Går inte att använda href här pga. /logout = post, Button blev ganska fult, Logout via Profile känns bättre -->
                </div>

                <div sec:authorize="!isAuthenticated()" style="display: flex; gap: 15px;">
                    <a href="/login" style="text-decoration: none; color: #0066cc;">Login</a>
                    <span style="color: #666;">|</span>
                    <a href="/register" style="text-decoration: none; color: #0066cc;">Register</a>
                </div>
            </nav>
        </div>
    </header>
</div>
</body>
</html>
