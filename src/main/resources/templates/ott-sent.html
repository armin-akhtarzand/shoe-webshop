<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Email Sent - Shoe Webshop</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h2 { color: #28a745; }
        p { color: #666; line-height: 1.6; margin: 20px 0; }
        .footer { font-size: 14px; color: #999; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Check your email!</h2>
        <p>We have sent a login link to your email address. Open the email and click the link to complete your login.</p>
        <p>If you don't see an email within a few minutes, please check your spam folder.</p>
        <div class="footer">
            <a th:href="@{/login}">Back to login</a>
        </div>
    </div>
</body>
</html>
