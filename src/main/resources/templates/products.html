<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Products - Shoe Webshop</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .categories {
            margin-bottom: 25px;
        }

        .category-link {
            margin-right: 10px;
            padding: 6px 12px;
            text-decoration: none;
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 6px;
        }

        .category-link.active {
            background: #e0e0e0;
            font-weight: bold;
        }

        .products {
            display: grid;
            grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
            gap: 18px;
        }

        .product {
            border: 1px solid #ddd;
            padding: 18px;
            background: #fff;
            border-radius: 10px;
            transition: transform .15s, box-shadow .15s;
        }

        .product:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, .1);
        }

        .price {
            font-weight: bold;
            color: #008000;
            margin: 10px 0;
        }

        button {
            background: #008000;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #006600;
        }

        .empty {
            text-align: center;
            padding: 40px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 10px;
        }

        .login-message {
            color: #cc0000;
            font-size: 0.9em;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<main class="container">
    <h1>Products</h1>

    <nav class="categories">
        <strong>Filter by category:</strong>

        <a class="category-link"
           th:href="@{/products}"
           th:classappend="${param.category == null} ? ' active'">
            All Products
        </a>

        <a class="category-link"
           th:href="@{/products/category/Sneakers(category='Sneakers')}"
           th:classappend="${param.category == 'Sneakers'} ? ' active'">
            Sneakers
        </a>

        <a class="category-link"
           th:href="@{/products/category/Boots(category='Boots')}"
           th:classappend="${param.category == 'Boots'} ? ' active'">
            Boots
        </a>

        <a class="category-link"
           th:href="@{/products/category/Sandals(category='Sandals')}"
           th:classappend="${param.category == 'Sandals'} ? ' active'">
            Sandals
        </a>

        <a class="category-link"
           th:href="@{/products/category/Formal(category='Formal')}"
           th:classappend="${param.category == 'Formal'} ? ' active'">
            Formal
        </a>
    </nav>

    <section class="products" th:if="${not #lists.isEmpty(products)}">

        <article th:each="product : ${products}" class="product">
            <img th:src="${product.productImageURL}" th:alt="${product.productName}" th:width="200px" th:height="auto"/>
            <h2 th:text="${product.productName}">Product Name</h2>
            <p>Category: <span th:text="${product.category}"></span></p>
            <p class="price" th:text="|Kr ${#numbers.formatDecimal(product.price,1,2)}|">Kr 0.00</p>

            <div sec:authorize="isAuthenticated()">
                <form th:action="@{/cart/add/{id}(id=${product.productId})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button>Add to cart</button>
                </form>
            </div>

            <p sec:authorize="!isAuthenticated()" class="login-message">
                Please <a th:href="@{/login}">login</a> to add items to cart
            </p>
        </article>

    </section>

    <section th:if="${#lists.isEmpty(products)}" class="empty">
        <h2>No products found</h2>
        <p th:text="${param.category != null} ? 'No products in category: ' + param.category : 'No products available.'"></p>
        <a th:href="@{/products}">View all products</a>
    </section>

</main>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
