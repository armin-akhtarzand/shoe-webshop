<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrering - Shoe Webshop</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; }
        div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="email"], input[type="password"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .checkbox-group { display: flex; align-items: flex-start; gap: 10px; }
        .checkbox-group input { width: auto; margin-top: 4px; }
        .checkbox-group label { font-weight: normal; font-size: 14px; }
        button { width: 100%; padding: 10px; background-color: #28a745; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        .field-error { color: red; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Skapa konto</h2>
        <form th:action="@{/register}" th:object="${userDto}" method="post">
            <div>
                <label for="email">E-post:</label>
                <input type="email" id="email" th:field="*{email}">
                <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></p>
            </div>
            <div>
                <label for="password">Lösenord:</label>
                <input type="password" id="password" th:field="*{password}">
                <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="field-error"></p>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="consent" th:field="*{consent}">
                <label for="consent">Jag godkänner behandlingen av mina personuppgifter enligt integritetspolicyn.</label>
            </div>
            <p th:if="${#fields.hasErrors('consent')}" th:errors="*{consent}" class="field-error" style="text-align: center;"></p>
            
            <button type="submit">Registrera mig</button>
        </form>
        <p style="text-align: center; margin-top: 15px;">Redan ett konto? <a th:href="@{/login}">Logga in här</a>.</p>
    </div>
</body>
</html>
